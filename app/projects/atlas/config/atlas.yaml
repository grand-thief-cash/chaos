server:
  host: 0.0.0.0
  port: 18400

logging:
  enabled: true
  level: INFO
  format: json
  output: file
  include_caller: true
  file_config:
    dir: ./logs
    filename: atlas
  rotate_config:
    enabled: true
    rotate_interval: 1d
    max_age: 72h
    cleanup_enabled: true

neo4j:
  uri: bolt://localhost:7687
  username: neo4j
  password: atlas_password
  database: neo4j
  max_connection_pool_size: 50

minio:
  endpoint: "localhost:9000"
  access_key: "${MINIO_ACCESS_KEY:minioadmin}"
  secret_key: "${MINIO_SECRET_KEY:minioadmin}"
  secure: false
  bucket: atlas-documents

skills:
  # 抽取技能 prompt 文件路径（相对于项目根目录或绝对路径）
  extraction_prompt: "../../tools/py/skills/[2026-04-28]INDUSTRY_EXTRATION_SKILLS.md"

llm:
  # DeepSeek V4 双模型策略
  extraction_model: "deepseek/deepseek-v4-flash"
  filter_model: "deepseek/deepseek-v4-flash"
  summary_model: "deepseek/deepseek-v4-flash"
  reasoning_model: "deepseek/deepseek-v4-pro"
  api_key: "${LLM_API_KEY}"
  api_base: "https://api.deepseek.com"
  max_retries: 3
  request_timeout: 120
  batch_concurrency: 3

document:
  storage_dir: ./data/documents
  chunk_max_chars: 3000
  chunk_overlap_chars: 200

pipeline:
  news_sources:
    - type: rss
      name: sina_finance
      url: "https://finance.sina.com.cn/rss/"
    - type: rss
      name: eastmoney
      url: ""
    - type: rss
      name: cls
      url: ""
  daily_max_news: 200
  daily_max_extraction: 50

graph:
  company_merge_threshold: 0.85
  impact_max_hops: 3
  low_confidence_threshold: 0.5

taxonomy:
  doc_types:
    - earnings
    - research
    - industry
    - news
    - policy
    - announcement
    - manual

  event_types:
    - price_change
    - supply_change
    - policy_new
    - policy_change
    - tariff_change
    - tech_breakthrough
    - capacity_change
    - merger_acquisition
    - investment
    - leadership_change
    - earnings_beat
    - earnings_miss
    - accident_disaster
    - sanction
    - other

  relationship_types:
    - SUPPLIER_OF
    - CUSTOMER_OF
    - DEPENDS_ON_RESOURCE
    - CONSUMES_RESOURCE
    - PRODUCES_RESOURCE
    - EXTRACTS_RESOURCE
    - COMPETITOR_OF
    - BELONGS_TO_INDUSTRY
    - OPERATES_IN_MARKET
    - PRODUCES
    - USES_TECHNOLOGY
    - OWNS_ASSET
    - SUBSIDIARY_OF
    - INVESTED_IN
    - PART_OF_PRODUCT
    - APPLIED_IN
    - INVOLVED_IN_EVENT
    - IMPACTED_BY_POLICY
    - IMPACT_ON
    - OTHER

dept_services:
  cronjob:
    host: "127.0.0.1"
    port: 19999
  phoenixA:
    host: "127.0.0.1"
    port: 18085

