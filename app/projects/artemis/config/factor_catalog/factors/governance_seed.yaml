factors:
  - name: dividend_yield
    description: 以最新可用现金分红方案对应的税前每股现金分红，除以 as_of_date 收盘价得到的股息率。
    latex_formula: "\\mathrm{DividendYield}=\\frac{\\mathrm{DVD\\_PER\\_SHARE\\_PRE\\_TAX\\_CASH}}{\\mathrm{Close}}"
    management_tags: [dividend, valuation, governance_critical, phoenixA_contract]
    market_adjust_policy:
      adjust: nf
      rationale: 股息率按 as_of_date 当日现价口径展示，当前治理约定使用不复权收盘价。
    source_fields:
      - corporate_action.dividend.data_json.DVD_PER_SHARE_PRE_TAX_CASH
      - bars.stock.zh_a.daily.close
    phoenix_queries:
      - endpoint: /api/v2/corporate-action/{source}/{action_type}
        source: amazing_data
        action_type: dividend
        params: [symbol, ann_date_before, progress_code]
        fields: [ann_date, report_period, progress_code, data_json.DVD_PER_SHARE_PRE_TAX_CASH]
        notes: 优先 progress_code=3（已实施）；若无实施方案，则回退到 as_of_date 前最新可用公告。
      - endpoint: /api/v2/bars/{asset_type}/{market}
        asset_type: stock
        market: zh_a
        params: [symbol, start_date, end_date, period=daily]
        fields: [trade_date, close]
        notes: 取 as_of_date 当日收盘价；具体复权口径由 `market_adjust_policy` 统一治理。
    governance:
      numerator_definition: 税前每股现金分红，不包含送股和转增。
      selection_policy: 优先已实施分红方案；若尚未实施，则使用 as_of_date 前最新公告方案并在管理页标记 fallback。
      pit_alignment: ann_date_before <= as_of_date
      availability_requirements:
        - dividend corporate action exists
        - daily close exists on as_of_date

  - name: dps
    description: 最新可用现金分红方案中的税前每股现金分红，用于分红管理和股息率计算链路复用。
    latex_formula: "\\mathrm{DPS}=\\mathrm{DVD\\_PER\\_SHARE\\_PRE\\_TAX\\_CASH}"
    management_tags: [dividend, per_share, governance_critical, phoenixA_contract]
    source_fields:
      - corporate_action.dividend.data_json.DVD_PER_SHARE_PRE_TAX_CASH
    phoenix_queries:
      - endpoint: /api/v2/corporate-action/{source}/{action_type}
        source: amazing_data
        action_type: dividend
        params: [symbol, ann_date_before, progress_code]
        fields: [ann_date, report_period, progress_code, data_json.DVD_PER_SHARE_PRE_TAX_CASH]
        notes: 与 dividend_yield 共用股息治理口径，保证 numerator 一致。
    governance:
      definition: 税前每股现金分红。
      exclusions: 不含送股、转增和税后股息字段。
      pit_alignment: ann_date_before <= as_of_date

  - name: pe_ttm
    description: 总市值除以归母净利润 TTM。总市值使用收盘价乘以最新可用总股本。
    latex_formula: "\\mathrm{PE}_{TTM}=\\frac{\\mathrm{Close} \\times \\mathrm{TOT\\_SHARE}}{\\mathrm{NET\\_PRO\\_EXCL\\_MIN\\_INT\\_INC}_{TTM}}"
    management_tags: [valuation, market_cap, governance_critical]
    market_adjust_policy:
      adjust: nf
      rationale: 估值因子当前统一采用现价 × 总股本的总市值口径。
    source_fields:
      - bars.stock.zh_a.daily.close
      - financial.balance_sheet.data_json.TOT_SHARE
      - financial.income.data_json.NET_PRO_EXCL_MIN_INT_INC
    phoenix_queries:
      - endpoint: /api/v2/bars/{asset_type}/{market}
        asset_type: stock
        market: zh_a
        params: [symbol, start_date, end_date, period=daily]
        fields: [trade_date, close]
      - endpoint: /api/v2/financial/{source}/balance_sheet
        source: amazing_data
        params: [symbol, ann_date_before, page_size]
        fields: [reporting_period, ann_date, data_json.TOT_SHARE]
      - endpoint: /api/v2/financial/{source}/income
        source: amazing_data
        params: [symbol, ann_date_before, page_size]
        fields: [reporting_period, ann_date, data_json.NET_PRO_EXCL_MIN_INT_INC]
    governance:
      market_cap_definition: close × TOT_SHARE
      share_basis: 总股本（TOT_SHARE），不是流通股本。
      pit_alignment: 价格按 as_of_date，股本按 as_of_date 前最新公告财报。

  - name: pb
    description: 总市值除以归母股东权益，当前统一采用总股本口径的总市值。
    latex_formula: "\\mathrm{PB}=\\frac{\\mathrm{Close} \\times \\mathrm{TOT\\_SHARE}}{\\mathrm{TOT\\_SHARE\\_EQUITY\\_EXCL\\_MIN\\_INT}}"
    management_tags: [valuation, market_cap, governance_critical]
    market_adjust_policy:
      adjust: nf
      rationale: PB 延续统一现价市值口径，避免与历史复权价混用。
    source_fields:
      - bars.stock.zh_a.daily.close
      - financial.balance_sheet.data_json.TOT_SHARE
      - financial.balance_sheet.data_json.TOT_SHARE_EQUITY_EXCL_MIN_INT
    governance:
      market_cap_definition: close × TOT_SHARE
      share_basis: 总股本（TOT_SHARE）
      pit_alignment: 价格按 as_of_date，分母按 as_of_date 前最新财报。

  - name: ps_ttm
    description: 总市值除以营业收入 TTM，沿用统一总市值口径。
    latex_formula: "\\mathrm{PS}_{TTM}=\\frac{\\mathrm{Close} \\times \\mathrm{TOT\\_SHARE}}{\\mathrm{OPERA\\_REV}_{TTM}}"
    management_tags: [valuation, market_cap]
    market_adjust_policy:
      adjust: nf
      rationale: PS_TTM 使用当前现价总市值口径。
    source_fields:
      - bars.stock.zh_a.daily.close
      - financial.balance_sheet.data_json.TOT_SHARE
      - financial.income.data_json.OPERA_REV
    governance:
      market_cap_definition: close × TOT_SHARE
      pit_alignment: 价格按 as_of_date，收入按 PIT TTM。

  - name: pcf
    description: 总市值除以经营现金流 TTM，沿用统一总市值口径。
    latex_formula: "\\mathrm{PCF}=\\frac{\\mathrm{Close} \\times \\mathrm{TOT\\_SHARE}}{\\mathrm{NET\\_CASH\\_FLOW\\_OPERA\\_ACT}_{TTM}}"
    management_tags: [valuation, market_cap]
    market_adjust_policy:
      adjust: nf
      rationale: PCF 当前按不复权现价估值展示。
    source_fields:
      - bars.stock.zh_a.daily.close
      - financial.balance_sheet.data_json.TOT_SHARE
      - financial.cashflow.data_json.NET_CASH_FLOW_OPERA_ACT
    governance:
      market_cap_definition: close × TOT_SHARE
      pit_alignment: 价格按 as_of_date，现金流按 PIT TTM。

  - name: ev_to_ebitda
    description: 企业价值除以 EBITDA，企业价值中的股权价值统一采用总股本市值。
    latex_formula: "\\mathrm{EV/EBITDA}=\\frac{\\mathrm{Close} \\times \\mathrm{TOT\\_SHARE}+\\mathrm{InterestBearingDebt}-\\mathrm{Cash}}{\\mathrm{EBITDA}_{TTM}}"
    management_tags: [valuation, market_cap, governance_critical]
    market_adjust_policy:
      adjust: nf
      rationale: EV/EBITDA 中股权价值部分与其它估值因子保持一致，统一使用现价口径。
    source_fields:
      - bars.stock.zh_a.daily.close
      - financial.balance_sheet.data_json.TOT_SHARE
      - financial.balance_sheet.data_json.ST_BORROWING
      - financial.balance_sheet.data_json.LT_LOAN
      - financial.balance_sheet.data_json.BONDS_PAYABLE
      - financial.balance_sheet.data_json.CURRENCY_CAP
      - financial.income.data_json.EBITDA
    governance:
      market_cap_definition: close × TOT_SHARE
      debt_definition: ST_BORROWING + LT_LOAN + BONDS_PAYABLE
      cash_definition: CURRENCY_CAP
      fallback: 若 PhoenixA 缺少 EBITDA，则退回 OPERA_PROFIT + LESS_FIN_EXP 的近似值。

  - name: roic
    description: 非金融行业使用 NOPAT/投入资本；对银行/保险/券商暂不输出，等待专用定义落地。
    management_tags: [financial_policy, profitability, governance_critical]
    financial_policy:
      mode: financial_variant_pending
      action: exclude_for_banks_insurers_brokers
      reason: 金融行业的有息负债属于经营性负债，标准 ROIC 定义失真。
      future_variant: 银行/保险/证券分别设计监管资本或风险资本口径后再补齐。

  - name: current_ratio
    description: 流动比率仅对非金融行业输出；金融行业短长债结构与流动性管理逻辑不同。
    management_tags: [financial_policy, solvency]
    financial_policy:
      mode: financial_variant_pending
      action: exclude_for_banks_insurers_brokers
      reason: 银行/保险/券商不存在可比的流动资产/流动负债经营含义。

  - name: quick_ratio
    description: 速动比率仅对非金融行业输出；金融行业待定义专用流动性指标。
    management_tags: [financial_policy, solvency]
    financial_policy:
      mode: financial_variant_pending
      action: exclude_for_banks_insurers_brokers
      reason: 金融行业资产负债表结构特殊，标准速动比率缺少比较意义。

  - name: asset_turnover
    description: 总资产周转率仅对非金融行业输出；金融行业需以生息资产或风险加权资产口径重设计。
    management_tags: [financial_policy, efficiency]
    financial_policy:
      mode: financial_variant_pending
      action: exclude_for_banks_insurers_brokers
      reason: 金融行业“收入/总资产”与实体行业不可横向比较。

  - name: inventory_turnover
    description: 存货周转率仅对非金融行业输出；金融行业通常无可比存货科目。
    management_tags: [financial_policy, efficiency]
    financial_policy:
      mode: financial_variant_pending
      action: exclude_for_banks_insurers_brokers
      reason: 金融行业缺乏存货经营模型。

  - name: receivable_turnover
    description: 应收账款周转率仅对非金融行业输出；金融行业应收/应付项目与授信、保险、券商业务不同。
    management_tags: [financial_policy, efficiency]
    financial_policy:
      mode: financial_variant_pending
      action: exclude_for_banks_insurers_brokers
      reason: 经营语义与实体行业不一致。

  - name: cash_cycle
    description: 现金循环天数仅对非金融行业输出；金融行业需单独定义资金周转或久期相关指标。
    management_tags: [financial_policy, efficiency]
    financial_policy:
      mode: financial_variant_pending
      action: exclude_for_banks_insurers_brokers
      reason: DSO/DIO/DPO 逻辑不适用于银行、保险和券商。

