tasks:
      # 其他 period/adjust 组合可按需扩展
  STOCK_ZH_A_LIST:
    variants:
      - match: { exchange: "SH" }
        config:
          # 上交所 A 股列表
          exchange: "SH"
      - match: { exchange: "SZ" }
        config:
          # 深交所 A 股列表
          exchange: "SZ"
      - match: { exchange: "BJ" }
        config:
          exchange: "BJ" 
      - match: { exchange: "ALL"}
        config:
          exchange: "ALL"

  # History Data
  STOCK_ZH_A_HIST_PARENT:
#    adjustflag：复权类型，默认不复权：3；1：后复权；2：前复权
#    frequency：数据类型，默认为d，日k线；d=日k线、w=周、m=月、5=5分钟、15=15分钟、30=30分钟、60=60分钟k线数据，不区分大小写
    variants:
      - match: { period: "daily", adjust: "nf" }
        config:
           period: "daily"
           adjust: "nf"
           exchange: "SH,SZ,BJ"
           start_date: "2016-01-01"
           fields: "date,open,high,low,close,preclose,volume,amount,turn,pctChg,peTTM,pbMRQ,psTTM,pcfNcfTTM"

      - match: { period: "daily", adjust: "hfq" }
        config:
           period: "daily"
           adjust: "hfq"
           exchange: "SH,SZ"
           start_date: "2009-01-01"
           fields: "date,open,high,low,close,preclose,volume,amount,turn,pctChg,peTTM,pbMRQ,psTTM,pcfNcfTTM"

  # Industry SWHY
  # 注意：行业任务的 index_codes 是 SDK 格式的行业指数代码（如 "851426.SI"），
  #       不需要 exchange 参数（与股票任务的 symbols 不同）
  STOCK_ZH_A_INDUSTRY_WEIGHT_SWHY:
    variants:
      - match: {}
        config:
          start_date: "2026-05-01"     # "YYYY-MM-DD" 或 null（不限）
          end_date: null       # "YYYY-MM-DD" 或 null（不限）
          # index_codes: ["851426.SI", "801010.SI"]  # string[]，行业指数代码（SDK格式），如 ["851426.SI", "801010.SI"]

  STOCK_ZH_A_INDUSTRY_WEIGHT_SWHY_CHILD:
    variants:
      - match: {}
        config: {}

  STOCK_ZH_A_INDUSTRY_DAILY_SWHY:
    variants:
      - match: {}
        config:
          start_date: "2026-01-01"     # "YYYY-MM-DD" 或 null（不限）
          end_date: "2026-05-01"       # "YYYY-MM-DD" 或 null（不限）
          index_codes: ["851426.SI"]  # string[]，行业指数代码（SDK格式），如 ["851426.SI"]

  STOCK_ZH_A_INDUSTRY_DAILY_SWHY_CHILD:
    variants:
      - match: {}
        config: {}

  STOCK_ZH_A_INDUSTRY_CONSTITUENT_SWHY:
    variants:
      - match: {}
        config: {}

  # Financial Statements
  # SDK: AmazingData InfoData (get_balance_sheet / get_cash_flow / get_income / get_profit_express / get_profit_notice)
  # 所有接口均支持 code_list 批量下载
  # symbols: 纯代码格式（如 "000001"），缺省则全量下载；exchange 指定交易所
  # start_date/end_date: YYYY-MM-DD，对应 SDK 的报告期范围
  # 增量模式: 指定 symbols + exchange + 日期范围
  # 全量模式: 不指定 symbols，SDK 自动获取全部 A 股列表
  STOCK_ZH_A_BALANCE_SHEET:
    variants:
      - match: {}
        config:
          start_date: "2015-01-01"     # "YYYY-MM-DD" 或 null（不限）
          end_date: "2026-05-01"       # "YYYY-MM-DD" 或 null（不限）
          symbols: ["000021"]
          exchange : "SZ"

  STOCK_ZH_A_CASH_FLOW:
    variants:
      - match: {}
        config:
          start_date: "2015-01-01"             # "YYYY-MM-DD" 或 null（不限）
          end_date: "2026-06-01"               # "YYYY-MM-DD" 或 null（不限）
          symbols: ["000021"]        # 纯代码格式，缺省则全量下载
          exchange: "SZ"             # 与 symbols 配合使用

  STOCK_ZH_A_INCOME:
    variants:
      - match: {}
        config:
          start_date: "2015-01-01"             # "YYYY-MM-DD" 或 null（不限）
          end_date: "2026-05-01"               # "YYYY-MM-DD" 或 null（不限）
          symbols: ["000021"]        # 纯代码格式，缺省则全量下载
          exchange: "SZ"             # 与 symbols 配合使用

  STOCK_ZH_A_PROFIT_EXPRESS:
    variants:
      - match: {}
        config:
          start_date: "2015-01-01"             # "YYYY-MM-DD" 或 null（不限）
          end_date: "2026-05-01"               # "YYYY-MM-DD" 或 null（不限）
          symbols: ["000001"]        # 纯代码格式，缺省则全量下载
          exchange: "SZ"             # 与 symbols 配合使用

  STOCK_ZH_A_PROFIT_NOTICE:
    variants:
      - match: {}
        config:
          start_date: "2015-01-01"             # "YYYY-MM-DD" 或 null（不限）
          end_date: "2026-05-01"               # "YYYY-MM-DD" 或 null（不限）
          symbols: ["000001"]        # 纯代码格式，缺省则全量下载
          exchange: "SZ"             # 与 symbols 配合使用

  # Corporate Actions
  # SDK: AmazingData InfoData.get_dividend / get_right_issue
  # 支持 code_list 批量下载
  # symbols: 纯代码格式（如 "000001"），缺省则全量下载；exchange 指定交易所
  # start_date/end_date: YYYY-MM-DD，对应 SDK 的公告日期范围
  # 增量模式: 指定 symbols + exchange + 日期范围
  # 全量模式: 不指定 symbols，SDK 自动获取全部 A 股列表
  STOCK_ZH_A_DIVIDEND:
    variants:
      - match: {}
        config:
          start_date: "2015-01-01"              # "YYYY-MM-DD" 或 null（不限）
          end_date: "2026-06-01"
          symbols: ["000001"]                   # 纯代码格式，缺省则全量下载
          exchange: "SZ"                        # 与 symbols 配合使用（SH/SZ/BJ）

  STOCK_ZH_A_RIGHT_ISSUE:
    variants:
      - match: {}
        config:
          start_date: "2015-01-01"                     # "YYYY-MM-DD" 或 null（不限）
          end_date: "2026-05-01"                    # "YYYY-MM-DD" 或 null（不限）
          symbols: ["000001"]                 # 纯代码格式，缺省则全量下载
          exchange: "SZ"                      # 与 symbols 配合使用

  # Trading anomaly dataset
  # SDK: AmazingData InfoData.get_long_hu_bang
  # 支持 code_list 批量下载
  # symbols: 纯代码格式（如 "000001"），缺省则全量下载；exchange 指定交易所
  # start_date/end_date: YYYY-MM-DD，对应 SDK 的交易日期范围
  STOCK_ZH_A_LONG_HU_BANG:
    variants:
      - match: {}
        config:
          start_date: "2026-01-01"             # "YYYY-MM-DD" 或 null（不限）
          end_date: "2026-05-27"               # "YYYY-MM-DD" 或 null（不限）
          # symbols: ["000001"]               # 纯代码格式，缺省则全量下载
          # exchange: "SZ"                    # 与 symbols 配合使用（SH/SZ/BJ）

  # Baostock 季频偿债能力
  # SDK: baostock query_balance_data(code, year, quarter)
  # 单 symbol 查询 → plan/child 模式
  # start_date/end_date 展开为 (year, quarter) 序列
  STOCK_ZH_A_BS_BALANCE_PARENT:
    variants:
      - match: {}
        config:
          start_date: "2025-01-01"
          end_date: "2026-05-01"
          exchange: "SH,SZ"
          symbol_list: "000001,600000"     # 逗号分隔，缺省则全量

  STOCK_ZH_A_BS_BALANCE_CHILD:
    variants:
      - match: {}
        config: {}

  # Baostock 除权除息信息
  # SDK: baostock query_dividend_data(code, year, yearType)
  # 单 symbol 查询 → plan/child 模式
  # start_date/end_date 展开为 year 列表
  STOCK_ZH_A_BS_DIVIDEND_PARENT:
    variants:
      - match: {}
        config:
          start_date: "2020-01-01"
          end_date: "2026-05-01"
          year_type: "report"                # "report"=预案公告年 / "operate"=除权除息年
          exchange: "SH,SZ"
          symbol_list: "000001,600000"

  STOCK_ZH_A_BS_DIVIDEND_CHILD:
    variants:
      - match: {}
        config: {}

  # Baostock 复权因子
  # SDK: baostock query_adjust_factor(code, start_date, end_date)
  # 单 symbol 查询 → plan/child 模式
  # start_date/end_date 直接传递给 child 的单证券查询
  STOCK_ZH_A_BS_ADJUST_FACTOR_PARENT:
    variants:
      - match: {}
        config:
          start_date: "2015-01-01"
          end_date: null
          exchange: "SH,SZ"
          # symbol_list: "000001,600000"     # 逗号分隔，缺省则从 PhoenixA 拉取全量证券

  STOCK_ZH_A_BS_ADJUST_FACTOR_CHILD:
    variants:
      - match: {}
        config: {}

  BACKTRADER_CAMPAIGN:
    variants:
      - match: { mode: "historical" }
        config:
          mode: "historical"
          market: "CN_A"
          period: "daily"
          adjust: "nf"
          cash: 100000.0
          commission: 0.001
          data_provider_code: "phoenixa_hist_daily"
          analyzer_profile: "default_hist_v1"
          persist_artifacts: ["analyzers", "trades", "equity_curve", "plot_manifest", "plot_series"]

  BACKTRADER_RUN:
    variants:
      - match: { mode: "historical" }
        config:
          mode: "historical"
          market: "CN_A"
          period: "daily"
          adjust: "nf"
          cash: 100000.0
          commission: 0.001
          data_provider_code: "phoenixa_hist_daily"
          analyzer_profile: "default_hist_v1"
          persist_artifacts: ["analyzers", "trades", "equity_curve", "plot_manifest", "plot_series"]

  # Eastmoney stock research-report PDF download
  # 单次运行：LIST 阶段按 [list_cursor, today] 从旧到新翻页 upsert 元数据（pending），
  # PROCESS 阶段取最早 N 份 pending 研报：详情页→PDF→MinIO→phoenixA 标记 downloaded。
  # 断点续传：pending/error 研报下次运行继续。受东财反爬限速，单次耗时取决于 download_limit。
  # 全量回补在多次运行中完成（list_cursor 单调推进，不会卡在旧页）。
  STOCK_ZH_A_EASTMONEY_REPORT:
    variants:
      - match: {}
        config:
          earliest_date: "2024-07-01"   # 东财滚动 ~2 年窗口；首次运行（phoenixA 无数据时）从此开始
          end_date: null                # null=今天，或 "YYYY-MM-DD"
          download_limit: 20            # 单次最多完整处理（详情+PDF）的研报数
          list_page_limit: 10           # 单次最多翻的列表页数（限制首次回补耗时）
          page_size: 50                 # 东财页大小，保持 50
          # 保守限速（东财反爬强制），可按需调整
          list_page_sleep: [3.0, 6.0]
          detail_page_sleep: [7.0, 15.0]
          pdf_download_sleep: [9.0, 18.0]
          retry_sleep: [45.0, 120.0]

