tasks:
      # 其他 period/adjust 组合可按需扩展
  STOCK_ZH_A_LIST:
    variants:
      - match: { exchange: "SH" }
        config:
          # 上交所 A 股列表
          exchange: "SH"
      - match: { exchange: "SZ" }
        config:
          # 深交所 A 股列表
          exchange: "SZ"
      - match: { exchange: "BJ" }
        config:
          exchange: "BJ" 
      - match: { exchange: "ALL"}
        config:
          exchange: "ALL"

  # History Data
  STOCK_ZH_A_HIST_PARENT:
#    adjustflag：复权类型，默认不复权：3；1：后复权；2：前复权
#    frequency：数据类型，默认为d，日k线；d=日k线、w=周、m=月、5=5分钟、15=15分钟、30=30分钟、60=60分钟k线数据，不区分大小写
    variants:
      - match: { period: "daily", adjust: "nf" }
        config:
           period: "daily"
           adjust: "nf"
           exchange: "SH,SZ,BJ"
           start_date: "2016-01-01"
           fields: "date,open,high,low,close,preclose,volume,amount,turn,pctChg,peTTM,pbMRQ,psTTM,pcfNcfTTM"

      - match: { period: "daily", adjust: "hfq" }
        config:
           period: "daily"
           adjust: "hfq"
           exchange: "SH,SZ"
           start_date: "2009-01-01"
           fields: "date,open,high,low,close,preclose,volume,amount,turn,pctChg,peTTM,pbMRQ,psTTM,pcfNcfTTM"

  # Industry SWHY
  STOCK_ZH_A_INDUSTRY_WEIGHT_SWHY:
    variants:
      - match: {}
        config:
          # symbols, start_date, end_date are optional
          # cronjob can override any field; omit symbols to download all industry indices
          start_date: null
          end_date: null

  STOCK_ZH_A_INDUSTRY_DAILY_SWHY:
    variants:
      - match: {}
        config:
          start_date: null
          end_date: null

  STOCK_ZH_A_INDUSTRY_CONSTITUENT_SWHY:
    variants:
      - match: {}
        config: {}

  BACKTRADER_CAMPAIGN:
    variants:
      - match: { mode: "historical" }
        config:
          mode: "historical"
          market: "CN_A"
          timeframe: "daily"
          adjust: "nf"
          cash: 100000.0
          commission: 0.001
          data_provider_code: "phoenixa_hist_daily"
          analyzer_profile: "default_hist_v1"
          persist_artifacts: ["analyzers", "trades", "equity_curve", "plot_manifest", "plot_series"]

  BACKTRADER_RUN:
    variants:
      - match: { mode: "historical" }
        config:
          mode: "historical"
          market: "CN_A"
          timeframe: "daily"
          adjust: "nf"
          cash: 100000.0
          commission: 0.001
          data_provider_code: "phoenixa_hist_daily"
          analyzer_profile: "default_hist_v1"
          persist_artifacts: ["analyzers", "trades", "equity_curve", "plot_manifest", "plot_series"]

