openapi: 3.0.3
info:
  title: PhoenixA Data and Feature Platform API
  version: v1.38.0
  description: |
    PhoenixA data middle-platform API for AmazingData datasets and governed,
    versioned Feature Platform materializations.

    ## Design principle

    This OpenAPI spec describes the **API shape** (paths, parameters, response
    envelopes, error codes). It does NOT describe individual field meanings —
    those live in the field dictionary and are exposed via the discovery API.

    ## Two-contract model

    - **API contract** (this file): how to call — paths, params, envelope.
    - **Data contract** (discovery API): what fields exist, their meanings,
      units, types. Always query discovery first when you need field info.

    ## Agent integration flow

    1. `GET /api/v2/catalog/datasets` — list available datasets.
    2. `GET /api/v2/catalog/datasets/{dataset}/fields?type=X&search=keyword`
       — discover field names by keyword; learn raw_field, canonical_field,
       unit, scale, value_type, storage_location.
    3. `GET /api/v2/catalog/enums/{enum_name}` — resolve enum codes.
    4. `GET /api/v2/{dataset-query-path}?fields=RAW_A,RAW_B&format=flat` —
       query data, projecting only the fields you discovered.
    5. `POST /api/v2/catalog/field-coverage/scan` periodically — find SDK-added
       fields the dictionary hasn't caught up with.

    Unknown fields in `fields=` return 400 with suggestions from the
    dictionary; use the suggestions to correct your request.

servers:
  - url: http://localhost:8085
    description: Local dev (config-home.yaml)

# ───────────────────────────────────────────────────────────────────
# Common conventions:
#   - Dates: YYYY-MM-DD strings.
#   - Symbols: pure codes without exchange suffix (e.g. "600519", not "sh600519").
#   - Markets: "zh_a" by default for A-share.
#   - Paginated endpoints accept page (1-based) and page_size (max 1000).
# ───────────────────────────────────────────────────────────────────

paths:
  # ─── Discovery: datasets ───
  /api/v2/catalog/datasets:
    get:
      tags: [Discovery]
      summary: List governed datasets
      description: |
        Returns all datasets registered in the field dictionary, with their
        storage table, data_types, and query/discovery API path templates.
      parameters:
        - in: query
          name: source
          schema: { type: string }
          description: Filter by source (e.g. "amazing_data").
      responses:
        '200':
          description: Dataset list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DatasetListResponse' }

  /api/v2/catalog/datasets/{dataset}/fields:
    get:
      tags: [Discovery]
      summary: Discover fields in a dataset
      description: |
        Returns field dictionary rows for one dataset, optionally filtered by
        data_type, search keyword, and metadata flags. Each row carries the
        raw_field name (what to pass to `fields=` in queries), canonical_field,
        label_zh, unit, scale, value_type, storage_location, is_core, and
        enum_ref.
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string }
          description: Dataset name (e.g. "financial_statement").
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
          description: Data type filter (e.g. "balance_sheet", "dividend").
        - in: query
          name: search
          schema: { type: string }
          description: Substring match on raw_field / canonical_field / label_zh / aliases.
        - in: query
          name: include
          schema: { type: string, enum: [all, core, metadata] }
          description: Filter by importance. Default "all".
      responses:
        '200':
          description: Field list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FieldDiscoveryResponse' }

  /api/v2/catalog/enums/{enum_name}:
    get:
      tags: [Discovery]
      summary: Resolve enum values
      description: Returns all code/label pairs for a named enum (e.g. REPORT_TYPE).
      parameters:
        - in: path
          name: enum_name
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Enum values.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnumDiscoveryResponse' }
        '404':
          description: Enum not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  # ─── Discovery: per-security data coverage ───
  /api/v2/catalog/securities/{security_id}/datasets/summary:
    get:
      tags: [Discovery]
      summary: Per-security data coverage summary
      description: |
        Returns row counts and time ranges for each dataset/data_type that
        exists for a given security_id. Covers financial_statement (by
        statement_type × report_type), corporate_action (by action_type),
        and equity_structure. Generic discovery API — not BI-specific.
      parameters:
        - in: path
          name: security_id
          required: true
          schema: { type: integer, format: int64, minimum: 1 }
          description: security_registry.id (Phase 3 surrogate key).
      responses:
        '200':
          description: Coverage summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SecurityCoverageResponse' }

  # ─── Discovery: field coverage ───
  /api/v2/catalog/field-coverage/scan:
    post:
      tags: [Coverage]
      summary: Scan datasets for observed data_json keys
      description: |
        Scans `data_json` keys in governed datasets, classifies each as
        governed (in dictionary) or ungoverned (SDK-added, not yet in
        dictionary), and upserts observations. Returns per-dataset summaries
        including the list of ungoverned keys found.

        Without `dataset=`, scans all governed datasets. Sampling caps
        per-dataset work to keep latency bounded; pass `sample_limit=0` for a
        full scan on small tables.
      parameters:
        - in: query
          name: dataset
          schema: { type: string }
          description: Optional — scan only this dataset.
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: sample_limit
          schema: { type: integer, minimum: 0 }
          description: Max rows scanned per dataset (most recent by id). 0 = no limit. Default 10000.
      responses:
        '200':
          description: Scan summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CoverageScanResponse' }

  /api/v2/catalog/field-coverage:
    get:
      tags: [Coverage]
      summary: List field coverage observations
      parameters:
        - in: query
          name: dataset
          schema: { type: string }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [governed, ungoverned] }
          description: Filter by status. Omit for all.
      responses:
        '200':
          description: Observations.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CoverageListResponse' }

  # ─── Query: financial statements ───
  /api/v2/financial/{source}/{statement_type}:
    get:
      tags: [Query]
      summary: Query financial statements
      description: |
        Dictionary-resolved query against the financial_statement table.
        Fields in `fields=` are resolved through the field dictionary — pass
        raw_field names (e.g. TOTAL_ASSETS) or canonical_field names; mixing
        is allowed. Unknown fields return 400 with suggestions.

        Use discovery (`/api/v2/catalog/datasets/financial_statement/fields`)
        to learn available field names, units, and types.
      parameters:
        - in: path
          name: source
          required: true
          schema: { type: string }
          example: amazing_data
        - in: path
          name: statement_type
          required: true
          schema: { type: string, enum: [balance_sheet, income, cashflow, profit_express, profit_notice] }
        - in: query
          name: format
          schema: { type: string, enum: [flat, nested], default: nested }
          description: |
            - `nested` (default): top_level columns + full data_json object.
            - `flat`: returns projected fields as top-level keys.
        - in: query
          name: fields
          schema: { type: string }
          description: |
            Comma-separated raw/canonical field names for flat projection.
            Ignored for nested format (which returns full data_json).
            Unknown fields return 400 with suggestions.
        - in: query
          name: security_id
          schema: { type: integer, format: int64, minimum: 1 }
          description: Single security_id (Phase 3 surrogate key) to filter on.
        - in: query
          name: security_ids
          schema: { type: string }
          description: Comma-separated list of security_ids.
        - in: query
          name: report_period
          schema: { type: string }
          description: Exact match on report_period (YYYY-MM-DD).
        - in: query
          name: period_start
          schema: { type: string }
        - in: query
          name: period_end
          schema: { type: string }
        - in: query
          name: ann_date_before
          schema: { type: string }
          description: PIT filter — only rows announced before this date.
        - in: query
          name: statement_code
          schema: { type: string }
          description: Numeric code (1=合并, 2=合并单季, 6=母公司, 7=母公司单季).
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        '200':
          description: Query result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FlatQueryResponse'
                  - $ref: '#/components/schemas/NestedQueryResponse'
        '400':
          description: Unknown field in `fields=`. Body contains suggestions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FieldResolutionError' }

  /api/v2/financial/{source}/{statement_type}/upsert:
    post:
      tags: [Write]
      summary: Batch upsert financial statements
      parameters:
        - in: path
          name: source
          required: true
          schema: { type: string }
        - in: path
          name: statement_type
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: array, items: { type: object } }
      responses:
        '200':
          description: Upserted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpsertResponse' }

  # ─── Query: corporate actions ───
  /api/v2/corporate-action/{source}/{action_type}:
    get:
      tags: [Query]
      summary: Query corporate actions (dividend / right_issue)
      parameters:
        - in: path
          name: source
          required: true
          schema: { type: string }
        - in: path
          name: action_type
          required: true
          schema: { type: string, enum: [dividend, right_issue] }
        - in: query
          name: format
          schema: { type: string, enum: [flat, nested], default: nested }
        - in: query
          name: fields
          schema: { type: string }
          description: Comma-separated raw/canonical field names for flat projection.
        - in: query
          name: security_id
          schema: { type: integer, format: int64, minimum: 1 }
          description: Single security_id (Phase 3 surrogate key) to filter on.
        - in: query
          name: security_ids
          schema: { type: string }
          description: Comma-separated list of security_ids.
        - in: query
          name: report_period
          schema: { type: string }
        - in: query
          name: period_start
          schema: { type: string }
        - in: query
          name: period_end
          schema: { type: string }
        - in: query
          name: ann_date_before
          schema: { type: string }
        - in: query
          name: progress_code
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        '200':
          description: Query result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FlatQueryResponse'
                  - $ref: '#/components/schemas/NestedQueryResponse'
        '400':
          description: Unknown field in `fields=`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FieldResolutionError' }

  /api/v2/corporate-action/{source}/{action_type}/upsert:
    post:
      tags: [Write]
      summary: Batch upsert corporate actions
      parameters:
        - in: path
          name: source
          required: true
          schema: { type: string }
        - in: path
          name: action_type
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: array, items: { type: object } }
      responses:
        '200':
          description: Upserted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpsertResponse' }

  # ─── Query: equity structure ───
  /api/v2/equity-structure/{source}:
    get:
      tags: [Query]
      summary: Query equity structure
      description: |
        AmazingData get_equity_structure output. Has a single data_type
        (equity_structure) — no `type` parameter needed.
      parameters:
        - in: path
          name: source
          required: true
          schema: { type: string }
        - in: query
          name: format
          schema: { type: string, enum: [flat, nested], default: nested }
        - in: query
          name: fields
          schema: { type: string }
        - in: query
          name: security_id
          schema: { type: integer, format: int64, minimum: 1 }
          description: Single security_id (Phase 3 surrogate key) to filter on.
        - in: query
          name: security_ids
          schema: { type: string }
          description: Comma-separated list of security_ids.
        - in: query
          name: change_date
          schema: { type: string }
          description: Exact match.
        - in: query
          name: change_start
          schema: { type: string }
        - in: query
          name: change_end
          schema: { type: string }
        - in: query
          name: ann_date_before
          schema: { type: string }
        - in: query
          name: current_only
          schema: { type: string, enum: ["1", "0", "true", "false"] }
          description: Only rows with current_sign=1.
        - in: query
          name: valid_only
          schema: { type: string, enum: ["1", "0", "true", "false"] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        '200':
          description: Query result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FlatQueryResponse'
                  - $ref: '#/components/schemas/NestedQueryResponse'
        '400':
          description: Unknown field in `fields=`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FieldResolutionError' }

  /api/v2/equity-structure/{source}/upsert:
    post:
      tags: [Write]
      summary: Batch upsert equity structure rows
      parameters:
        - in: path
          name: source
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: array, items: { type: object } }
      responses:
        '200':
          description: Upserted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpsertResponse' }

  # --- Feature Platform: registry and governance ---
  /api/v2/features/registry/sync:
    post:
      tags: [Feature Platform]
      summary: Synchronize governed feature manifests
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureRegistrySyncRequest' }
      responses:
        '200':
          description: Per-manifest synchronization result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureRegistrySyncResponse' }
        '400': { $ref: '#/components/responses/FeatureError' }
        '409': { $ref: '#/components/responses/FeatureError' }
        '422': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/definitions:
    get:
      tags: [Feature Platform]
      summary: List governed feature definitions
      parameters:
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: owner, schema: { type: string } }
        - $ref: '#/components/parameters/FeatureLimit'
        - $ref: '#/components/parameters/FeatureOffset'
      responses:
        '200':
          description: Feature definition page.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeaturePage' }

  /api/v2/features/definitions/{feature_code}:
    parameters:
      - $ref: '#/components/parameters/FeatureCode'
    get:
      tags: [Feature Platform]
      summary: Get a definition and all version summaries
      responses:
        '200':
          description: Definition detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureDefinitionDetail' }
        '404': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/versions/{version_id}:
    parameters:
      - $ref: '#/components/parameters/FeatureVersionID'
    get:
      tags: [Feature Platform]
      summary: Get a feature version by registry ID
      responses:
        '200':
          description: Version, implementation, and dependency snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureVersionSummary' }
        '404': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/definitions/{feature_code}/versions/{version}:publish:
    parameters:
      - $ref: '#/components/parameters/FeatureCode'
      - $ref: '#/components/parameters/FeatureVersionNumber'
    post:
      tags: [Feature Platform]
      summary: Publish an immutable feature version
      responses:
        '200':
          description: Version published.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureLifecycleResponse' }
        '404': { $ref: '#/components/responses/FeatureError' }
        '409': { $ref: '#/components/responses/FeatureError' }
        '422': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/definitions/{feature_code}/versions/{version}:deprecate:
    parameters:
      - $ref: '#/components/parameters/FeatureCode'
      - $ref: '#/components/parameters/FeatureVersionNumber'
    post:
      tags: [Feature Platform]
      summary: Deprecate a published feature version
      responses:
        '200':
          description: Version deprecated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureLifecycleResponse' }
        '404': { $ref: '#/components/responses/FeatureError' }
        '409': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/lineage/{feature_code}:
    parameters:
      - $ref: '#/components/parameters/FeatureCode'
    get:
      tags: [Feature Platform]
      summary: Get versioned upstream and downstream lineage
      responses:
        '200':
          description: Version-level feature and data-field lineage.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureLineage' }
        '404': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/availability/{feature_code}:
    parameters:
      - $ref: '#/components/parameters/FeatureCode'
    get:
      tags: [Feature Platform]
      summary: Get execution readiness and materialization availability
      parameters:
        - $ref: '#/components/parameters/SourceProfile'
      responses:
        '200':
          description: Multi-dimensional availability assessment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureAvailability' }
        '404': { $ref: '#/components/responses/FeatureError' }

  # --- Feature Platform: run state and persistence ---
  /api/v2/features/runs:
    post:
      tags: [Feature Platform]
      summary: Create or idempotently reuse a feature run
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureRunCreateRequest' }
      responses:
        '200':
          description: Existing run reused.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureRunCreateResponse' }
        '202':
          description: New run accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureRunCreateResponse' }
        '409': { $ref: '#/components/responses/FeatureError' }
        '422': { $ref: '#/components/responses/FeatureError' }
    get:
      tags: [Feature Platform]
      summary: List persisted feature runs
      parameters:
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: producer_service, schema: { type: string } }
        - { in: query, name: feature_version_id, schema: { type: integer, minimum: 1 } }
        - { in: query, name: backfill_id, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/FeatureLimit'
        - $ref: '#/components/parameters/FeatureOffset'
      responses:
        '200':
          description: Feature run page.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeaturePage' }

  /api/v2/features/runs:reconcile-stale:
    post:
      tags: [Feature Platform]
      summary: Abort runs whose heartbeat is stale
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureStaleRunReconcileRequest' }
      responses:
        '200':
          description: Reconciliation result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureStaleRunReconcileResponse' }
        '400': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/runs/{run_id}:
    parameters:
      - $ref: '#/components/parameters/FeatureRunID'
    get:
      tags: [Feature Platform]
      summary: Get run, items, and optionally the subject snapshot
      parameters:
        - in: query
          name: include_subjects
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Persisted execution evidence.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureRunDetail' }
        '404': { $ref: '#/components/responses/FeatureError' }
    patch:
      tags: [Feature Platform]
      summary: Apply an optimistic run state transition or heartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureStateUpdateRequest' }
      responses:
        '200':
          description: Updated run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureRun' }
        '409': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/runs/{run_id}/subjects:batch:
    parameters:
      - $ref: '#/components/parameters/FeatureRunID'
    post:
      tags: [Feature Platform]
      summary: Persist the immutable run subject snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureSubjectsBatchRequest' }
      responses:
        '200': { $ref: '#/components/responses/FeatureBatchResult' }
        '409': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/runs/{run_id}/items:batch:
    parameters:
      - $ref: '#/components/parameters/FeatureRunID'
    post:
      tags: [Feature Platform]
      summary: Initialize the versioned item state for a run
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureItemsBatchRequest' }
      responses:
        '200': { $ref: '#/components/responses/FeatureBatchResult' }
        '409': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/runs/{run_id}/items/{version_id}:
    parameters:
      - $ref: '#/components/parameters/FeatureRunID'
      - $ref: '#/components/parameters/FeatureVersionID'
    patch:
      tags: [Feature Platform]
      summary: Update one run item's state and quality counters
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureRunItemUpdateRequest' }
      responses:
        '200':
          description: Updated run item.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureRunItem' }
        '409': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/runs/{run_id}/values/numeric:batch:
    parameters:
      - $ref: '#/components/parameters/FeatureRunID'
    post:
      tags: [Feature Platform]
      summary: Idempotently persist a numeric feature value batch
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureNumericBatchRequest' }
      responses:
        '200': { $ref: '#/components/responses/FeatureBatchResult' }
        '409': { $ref: '#/components/responses/FeatureError' }
        '422': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/runs/{run_id}:complete:
    parameters:
      - $ref: '#/components/parameters/FeatureRunID'
    post:
      tags: [Feature Platform]
      summary: Complete a run after every item succeeds
      responses:
        '200':
          description: Completed run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureRun' }
        '409': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/runs/{run_id}:fail:
    parameters:
      - $ref: '#/components/parameters/FeatureRunID'
    post:
      tags: [Feature Platform]
      summary: Mark a run failed with stable error evidence
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureFailureRequest' }
      responses:
        '200':
          description: Failed run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureRun' }
        '409': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/runs/{run_id}:cancel:
    parameters:
      - $ref: '#/components/parameters/FeatureRunID'
    post:
      tags: [Feature Platform]
      summary: Cancel a non-terminal run
      responses:
        '200':
          description: Cancelled run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureRun' }
        '409': { $ref: '#/components/responses/FeatureError' }

  # --- Feature Platform: query and backfill ---
  /api/v2/features/values/numeric:
    get:
      tags: [Feature Platform]
      summary: Query persisted numeric feature values
      parameters:
        - $ref: '#/components/parameters/FeatureCodeQuery'
        - $ref: '#/components/parameters/FeatureVersionQuery'
        - $ref: '#/components/parameters/FeatureVersionIDQuery'
        - $ref: '#/components/parameters/FeatureRunIDQuery'
        - $ref: '#/components/parameters/SecurityIDsQuery'
        - $ref: '#/components/parameters/ObservedFromQuery'
        - $ref: '#/components/parameters/ObservedToQuery'
        - $ref: '#/components/parameters/FeatureLimit'
        - $ref: '#/components/parameters/FeatureOffset'
      responses:
        '200': { $ref: '#/components/responses/FeatureValuePage' }
        '400': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/values/numeric/latest:
    get:
      tags: [Feature Platform]
      summary: Query the latest successful materialization per security
      parameters:
        - $ref: '#/components/parameters/FeatureCodeQuery'
        - $ref: '#/components/parameters/FeatureVersionQuery'
        - $ref: '#/components/parameters/FeatureVersionIDQuery'
        - $ref: '#/components/parameters/FeatureRunIDQuery'
        - $ref: '#/components/parameters/SecurityIDsQuery'
        - $ref: '#/components/parameters/ObservedFromQuery'
        - $ref: '#/components/parameters/ObservedToQuery'
        - $ref: '#/components/parameters/FeatureLimit'
        - $ref: '#/components/parameters/FeatureOffset'
      responses:
        '200': { $ref: '#/components/responses/FeatureValuePage' }
        '400': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/values/numeric/cross-section:
    get:
      tags: [Feature Platform]
      summary: Query a numeric feature cross-section at one observation time
      parameters:
        - $ref: '#/components/parameters/FeatureCodeQuery'
        - $ref: '#/components/parameters/FeatureVersionQuery'
        - $ref: '#/components/parameters/FeatureVersionIDQuery'
        - $ref: '#/components/parameters/FeatureRunIDQuery'
        - $ref: '#/components/parameters/SecurityIDsQuery'
        - in: query
          name: observed_at
          required: true
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/FeatureLimit'
        - $ref: '#/components/parameters/FeatureOffset'
      responses:
        '200': { $ref: '#/components/responses/FeatureValuePage' }
        '400': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/backfills:
    post:
      tags: [Feature Platform]
      summary: Create a calendar-expanded feature backfill
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureBackfillCreateRequest' }
      responses:
        '202':
          description: Backfill job and expanded runs.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureBackfillDetail' }
        '400': { $ref: '#/components/responses/FeatureError' }
        '422': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/backfills/{backfill_id}:
    parameters:
      - $ref: '#/components/parameters/FeatureBackfillID'
    get:
      tags: [Feature Platform]
      summary: Get a backfill job and its runs
      responses:
        '200':
          description: Backfill detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureBackfillDetail' }
        '404': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/backfills/{backfill_id}:retry-failed:
    parameters:
      - $ref: '#/components/parameters/FeatureBackfillID'
    post:
      tags: [Feature Platform]
      summary: Create retry runs for failed backfill partitions
      responses:
        '202':
          description: Created retry runs.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '409': { $ref: '#/components/responses/FeatureError' }

  /api/v2/features/backfills/{backfill_id}:cancel:
    parameters:
      - $ref: '#/components/parameters/FeatureBackfillID'
    post:
      tags: [Feature Platform]
      summary: Cancel a backfill and all non-terminal child runs
      responses:
        '200':
          description: Backfill cancelled.
          content:
            application/json:
              schema: { type: object, properties: { status: { type: string, example: cancelled } } }
        '409': { $ref: '#/components/responses/FeatureError' }

components:
  parameters:
    FeatureCode:
      in: path
      name: feature_code
      required: true
      schema: { type: string, pattern: '^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+$' }
    FeatureVersionNumber:
      in: path
      name: version
      required: true
      schema: { type: integer, minimum: 1 }
    FeatureVersionID:
      in: path
      name: version_id
      required: true
      schema: { type: integer, minimum: 1 }
    FeatureRunID:
      in: path
      name: run_id
      required: true
      schema: { type: string, format: uuid }
    FeatureBackfillID:
      in: path
      name: backfill_id
      required: true
      schema: { type: string, format: uuid }
    SourceProfile:
      in: query
      name: source_profile
      schema: { type: string, default: default }
    FeatureCodeQuery:
      in: query
      name: feature_code
      schema: { type: string }
    FeatureVersionQuery:
      in: query
      name: version
      schema: { type: integer, minimum: 1 }
    FeatureVersionIDQuery:
      in: query
      name: feature_version_id
      schema: { type: integer, minimum: 1 }
    FeatureRunIDQuery:
      in: query
      name: run_id
      schema: { type: string, format: uuid }
    SecurityIDsQuery:
      in: query
      name: security_ids
      description: Comma-separated PhoenixA security IDs.
      schema: { type: string, example: '1,2,3' }
    ObservedFromQuery:
      in: query
      name: observed_from
      schema: { type: string, format: date-time }
    ObservedToQuery:
      in: query
      name: observed_to
      schema: { type: string, format: date-time }
    FeatureLimit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
    FeatureOffset:
      in: query
      name: offset
      schema: { type: integer, minimum: 0, default: 0 }

  responses:
    FeatureError:
      description: Stable Feature Platform error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/FeaturePlatformError' }
    FeatureBatchResult:
      description: Idempotent batch write result.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/FeatureBatchResult' }
    FeatureValuePage:
      description: Numeric value page.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/FeatureValuePage' }

  schemas:
    FeaturePlatformError:
      type: object
      required: [code, error]
      properties:
        code: { type: string, example: MANIFEST_CHECKSUM_CONFLICT }
        error: { type: string }

    FeatureManifest:
      type: object
      required: [feature, version, implementation, dependencies]
      properties:
        feature:
          type: object
          required: [code, display_name, description, kind, entity_type, value_type, unit, category, owner, tags]
          additionalProperties: false
          properties:
            code: { type: string }
            display_name: { type: string }
            description: { type: string }
            kind: { type: string }
            entity_type: { type: string }
            value_type: { type: string }
            unit: { type: string }
            category: { type: string }
            owner: { type: string }
            tags: { type: array, items: { type: string } }
        version:
          type: object
          required: [number, status, frequency, as_of_semantics, missing_policy, manifest_checksum]
          additionalProperties: false
          properties:
            number: { type: integer, minimum: 1 }
            status: { type: string, enum: [draft, published, deprecated] }
            frequency: { type: string }
            as_of_semantics: { type: string, enum: [point_in_time, latest] }
            missing_policy: { type: string }
            manifest_checksum: { type: string, minLength: 64, maxLength: 64 }
        implementation:
          type: object
          required: [kind, producer_service, backend, entrypoint, implementation_revision, config, checksum, status]
          additionalProperties: false
          properties:
            kind: { type: string }
            producer_service: { type: string }
            backend: { type: string }
            entrypoint: { type: string }
            implementation_revision: { type: integer, minimum: 1 }
            config: { type: object, additionalProperties: true }
            checksum: { type: string, minLength: 64, maxLength: 64 }
            status: { type: string }
        dependencies:
          type: array
          items: { type: object, additionalProperties: true }

    FeatureRegistrySyncRequest:
      type: object
      required: [manifests]
      properties:
        manifests:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/FeatureManifest' }

    FeatureRegistrySyncResponse:
      type: object
      required: [created, updated_drafts, unchanged, rejected, graph_valid]
      properties:
        created: { type: array, items: { type: string } }
        updated_drafts: { type: array, items: { type: string } }
        unchanged: { type: array, items: { type: string } }
        rejected:
          type: array
          items:
            type: object
            required: [feature, code, error]
            properties:
              feature: { type: string }
              code: { type: string }
              error: { type: string }
        graph_valid: { type: boolean }

    FeatureDefinition:
      type: object
      required: [id, feature_code, display_name, kind, entity_type, value_type, status]
      properties:
        id: { type: integer, minimum: 1 }
        feature_code: { type: string }
        display_name: { type: string }
        description: { type: string }
        kind: { type: string }
        entity_type: { type: string }
        value_type: { type: string }
        unit: { type: string }
        category: { type: string }
        owner: { type: string }
        status: { type: string }
        tags: { type: array, items: { type: string } }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    FeatureVersion:
      type: object
      required: [id, feature_id, version_number, status, manifest_checksum]
      properties:
        id: { type: integer, minimum: 1 }
        feature_id: { type: integer, minimum: 1 }
        version_number: { type: integer, minimum: 1 }
        status: { type: string, enum: [draft, published, deprecated] }
        frequency: { type: string }
        as_of_semantics: { type: string }
        missing_policy: { type: string }
        manifest_checksum: { type: string }
        manifest_snapshot: { type: object, additionalProperties: true }
        published_at: { type: string, format: date-time }
        deprecated_at: { type: string, format: date-time }

    FeatureVersionSummary:
      type: object
      required: [version, implementations, dependencies]
      properties:
        version: { $ref: '#/components/schemas/FeatureVersion' }
        implementations: { type: array, items: { type: object, additionalProperties: true } }
        dependencies: { type: array, items: { type: object, additionalProperties: true } }

    FeatureDefinitionDetail:
      type: object
      required: [definition, versions]
      properties:
        definition: { $ref: '#/components/schemas/FeatureDefinition' }
        versions: { type: array, items: { $ref: '#/components/schemas/FeatureVersionSummary' } }

    FeaturePage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items: { type: array, items: { type: object, additionalProperties: true } }
        total: { type: integer, minimum: 0 }
        limit: { type: integer }
        offset: { type: integer }

    FeatureLifecycleResponse:
      type: object
      required: [status, version]
      properties:
        status: { type: string, enum: [published, deprecated] }
        version: { type: integer, minimum: 1 }

    FeatureLineage:
      type: object
      required: [feature_code, versions]
      properties:
        feature_code: { type: string }
        versions:
          type: array
          items:
            type: object
            required: [feature_version_id, version_number, upstream, downstream]
            additionalProperties: true

    FeatureAvailability:
      type: object
      required: [feature_code, source_profile, status, execution_readiness, reasons]
      properties:
        feature_code: { type: string }
        source_profile: { type: string }
        latest_published_version_id: { type: integer, minimum: 1 }
        latest_succeeded_run: { $ref: '#/components/schemas/FeatureRun' }
        status: { type: string }
        definition_status: { type: string }
        version_status: { type: string }
        dependency_status: { type: string }
        data_status: { type: string }
        implementation_status: { type: string }
        materialization_status: { type: string }
        execution_readiness: { type: string }
        reasons: { type: array, items: { type: string } }
        data_fields: { type: array, items: { type: object, additionalProperties: true } }

    FeatureRunCreateRequest:
      type: object
      required:
        - request_fingerprint
        - producer_service
        - trigger_type
        - as_of_time
        - data_cutoff_time
        - source_profile
        - market
        - universe_hash
        - code_revision
        - root_feature_version_ids
      properties:
        run_id: { type: string, format: uuid }
        request_fingerprint: { type: string, minLength: 64, maxLength: 64 }
        producer_service: { type: string }
        producer_run_ref: { type: string }
        trigger_type: { type: string, enum: [manual, cron, api, backfill] }
        as_of_time: { type: string, format: date-time }
        data_cutoff_time: { type: string, format: date-time }
        source_profile: { type: string }
        market: { type: string }
        universe_hash: { type: string }
        code_revision: { type: string }
        root_feature_version_ids: { type: array, minItems: 1, items: { type: integer, minimum: 1 } }
        dependency_plan_checksum: { type: string }
        parameters: { type: object, additionalProperties: true }
        retry_of_run_id: { type: string, format: uuid }
        force: { type: boolean, default: false }

    FeatureRunCreateResponse:
      type: object
      required: [accepted, reused, run_id, status, request_fingerprint]
      properties:
        accepted: { type: boolean }
        reused: { type: boolean }
        run_id: { type: string, format: uuid }
        status: { type: string }
        request_fingerprint: { type: string }

    FeatureRun:
      type: object
      required: [run_id, status, producer_service, as_of_time, data_cutoff_time, source_profile, code_revision]
      properties:
        run_id: { type: string, format: uuid }
        request_fingerprint: { type: string }
        producer_service: { type: string }
        producer_run_ref: { type: string }
        trigger_type: { type: string }
        status: { type: string, enum: [pending, running, succeeded, failed, cancelled, aborted] }
        worker_id: { type: string }
        heartbeat_at: { type: string, format: date-time }
        as_of_time: { type: string, format: date-time }
        data_cutoff_time: { type: string, format: date-time }
        source_profile: { type: string }
        market: { type: string }
        universe_hash: { type: string }
        code_revision: { type: string }
        root_feature_version_ids: { type: array, items: { type: integer } }
        parameters: { type: object, additionalProperties: true }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
        error_code: { type: string }
        error_message: { type: string }

    FeatureRunItem:
      type: object
      required: [run_id, feature_version_id, status, input_count, output_count, valid_count, missing_count, invalid_count]
      properties:
        run_id: { type: string, format: uuid }
        feature_version_id: { type: integer, minimum: 1 }
        status: { type: string }
        input_count: { type: integer }
        output_count: { type: integer }
        valid_count: { type: integer }
        missing_count: { type: integer }
        invalid_count: { type: integer }
        quality_summary: { type: object, additionalProperties: true }
        duration_ms: { type: integer }
        error_code: { type: string }
        error_message: { type: string }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }

    FeatureRunDetail:
      type: object
      required: [run, items, subjects]
      properties:
        run: { $ref: '#/components/schemas/FeatureRun' }
        items: { type: array, items: { $ref: '#/components/schemas/FeatureRunItem' } }
        subjects: { type: array, items: { type: object, additionalProperties: true } }

    FeatureSubjectsBatchRequest:
      type: object
      required: [security_ids]
      properties:
        security_ids: { type: array, minItems: 1, items: { type: integer, minimum: 1 } }
        included_reason: { type: string }

    FeatureItemsBatchRequest:
      type: object
      required: [feature_version_ids]
      properties:
        feature_version_ids: { type: array, minItems: 1, items: { type: integer, minimum: 1 } }

    FeatureStateUpdateRequest:
      type: object
      required: [expected_status, new_status]
      properties:
        expected_status: { type: string }
        new_status: { type: string }
        worker_id: { type: string }
        heartbeat_at: { type: string, format: date-time }
        error_code: { type: string }
        error_message: { type: string }

    FeatureRunItemUpdateRequest:
      type: object
      required: [expected_status, new_status, input_count, output_count, valid_count, missing_count, invalid_count, duration_ms]
      properties:
        expected_status: { type: string }
        new_status: { type: string }
        input_count: { type: integer, minimum: 0 }
        output_count: { type: integer, minimum: 0 }
        valid_count: { type: integer, minimum: 0 }
        missing_count: { type: integer, minimum: 0 }
        invalid_count: { type: integer, minimum: 0 }
        duration_ms: { type: integer, minimum: 0 }
        quality_summary: { type: object, additionalProperties: true }
        error_code: { type: string }
        error_message: { type: string }

    FeatureStaleRunReconcileRequest:
      type: object
      required: [stale_before, producer_service]
      properties:
        stale_before: { type: string, format: date-time }
        producer_service: { type: string }

    FeatureStaleRunReconcileResponse:
      type: object
      required: [stale_before, aborted_count, run_ids]
      properties:
        stale_before: { type: string, format: date-time }
        aborted_count: { type: integer, minimum: 0 }
        run_ids: { type: array, items: { type: string, format: uuid } }

    FeatureNumericBatchRequest:
      type: object
      required: [feature_version_id, observed_at, values]
      properties:
        feature_version_id: { type: integer, minimum: 1 }
        observed_at: { type: string, format: date-time }
        values:
          type: array
          minItems: 1
          items:
            type: object
            required: [security_id, value_status]
            properties:
              security_id: { type: integer, minimum: 1 }
              value: { type: number, nullable: true }
              value_status: { type: string, enum: [valid, missing, invalid] }
              quality_flags: { type: object, additionalProperties: true }
              source_max_available_at: { type: string, format: date-time }

    FeatureNumericValue:
      type: object
      required: [run_id, feature_version_id, security_id, observed_at, value_status, computed_at]
      properties:
        run_id: { type: string, format: uuid }
        feature_version_id: { type: integer, minimum: 1 }
        feature_code: { type: string }
        version_number: { type: integer, minimum: 1 }
        security_id: { type: integer, minimum: 1 }
        observed_at: { type: string, format: date-time }
        value: { type: number, nullable: true }
        value_status: { type: string, enum: [valid, missing, invalid] }
        quality_flags: { type: object, additionalProperties: true }
        source_max_available_at: { type: string, format: date-time }
        computed_at: { type: string, format: date-time }

    FeatureValuePage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/FeatureNumericValue' } }
        total: { type: integer, minimum: 0 }
        limit: { type: integer }
        offset: { type: integer }

    FeatureBatchResult:
      type: object
      required: [status, inserted]
      properties:
        status: { type: string, example: ok }
        inserted: { type: integer, minimum: 0 }

    FeatureFailureRequest:
      type: object
      required: [error_code, error_message]
      properties:
        error_code: { type: string }
        error_message: { type: string }

    FeatureBackfillCreateRequest:
      type: object
      required: [root_feature_version_ids, start_as_of, end_as_of, step, source_profile, market, universe_request]
      properties:
        root_feature_version_ids: { type: array, minItems: 1, items: { type: integer, minimum: 1 } }
        start_as_of: { type: string, format: date-time }
        end_as_of: { type: string, format: date-time }
        step: { type: string }
        calendar_code: { type: string }
        data_cutoff_policy: { type: object, additionalProperties: true }
        source_profile: { type: string }
        market: { type: string }
        universe_request: { type: object, additionalProperties: true }
        max_concurrency: { type: integer, minimum: 1 }

    FeatureBackfillDetail:
      type: object
      required: [job, runs]
      properties:
        job: { type: object, additionalProperties: true }
        runs: { type: array, items: { $ref: '#/components/schemas/FeatureRun' } }

    ApiError:
      type: object
      properties:
        error: { type: string }

    UpsertResponse:
      type: object
      properties:
        status: { type: string, example: ok }
        count: { type: integer }

    SecurityCoverageResponse:
      type: object
      description: |
        Per-security data coverage. Lists each dataset that has rows for this
        security_id, broken down by data_type. For financial_statement, each
        data_type further breaks down by report_type (1=Q1, 2=H1, 3=Q3, 4=FY).
      properties:
        generated_at: { type: string, format: date-time }
        security_id: { type: integer, format: int64 }
        datasets:
          type: array
          items: { $ref: '#/components/schemas/SymbolCoverageDataset' }

    SymbolCoverageDataset:
      type: object
      properties:
        dataset: { type: string }
        source: { type: string }
        data_types:
          type: array
          items: { $ref: '#/components/schemas/SymbolCoverageDataType' }

    SymbolCoverageDataType:
      type: object
      properties:
        data_type: { type: string }
        total_rows: { type: integer }
        earliest_period: { type: string, description: 'YYYY-MM-DD or empty' }
        latest_period: { type: string, description: 'YYYY-MM-DD or empty' }
        latest_ann_date: { type: string, description: 'YYYY-MM-DD or empty' }
        by_report_type:
          type: array
          description: Only for financial_statement; empty otherwise.
          items: { $ref: '#/components/schemas/SymbolCoverageReportTypeBucket' }

    SymbolCoverageReportTypeBucket:
      type: object
      properties:
        report_type: { type: string }
        row_count: { type: integer }
        earliest_period: { type: string }
        latest_period: { type: string }
        latest_ann_date: { type: string }

    DatasetListResponse:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        contract_version: { type: string }
        datasets:
          type: array
          items: { $ref: '#/components/schemas/DatasetEntry' }

    DatasetEntry:
      type: object
      properties:
        source: { type: string }
        dataset: { type: string }
        label_zh: { type: string }
        data_types:
          type: array
          items: { type: string }
        storage_table: { type: string }
        source_doc: { type: string }
        field_discovery: { type: string }
        query: { type: string }
      description: |
        `query` is the path template for data queries (may be empty if
        discovery-only). `field_discovery` is the path to field discovery.

    FieldDiscoveryResponse:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        dataset: { type: string }
        source: { type: string }
        data_type: { type: string }
        contract_version: { type: string }
        fields:
          type: array
          items: { $ref: '#/components/schemas/FieldDiscoveryEntry' }

    FieldDiscoveryEntry:
      type: object
      description: |
        Authoritative field metadata. Use `raw_field` (or canonical_field) in
        query `fields=` parameters. `storage_location` tells you whether the
        field is a top_level column or lives in data_json — but you do not
        need to know this to query it; the resolver handles it.
      properties:
        raw_field: { type: string }
        canonical_field: { type: string }
        label_zh: { type: string }
        description: { type: string }
        value_type: { type: string }
        unit: { type: string }
        scale: { type: integer }
        enum_ref: { type: string }
        storage_location: { type: string, enum: [top_level, data_json] }
        query_name: { type: string }
        is_metadata: { type: boolean }
        is_core: { type: boolean }
        aliases:
          type: array
          items: { type: string }
        source_doc: { type: string }

    EnumDiscoveryResponse:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        enum_name: { type: string }
        values:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              label_zh: { type: string }

    FlatQueryResponse:
      type: object
      description: |
        Flat query envelope. `rows` is an array of objects whose keys are the
        requested `fields` (or all top-level keys if `fields` omitted). Values
        are serialized as strings (numeric/JSONB values are cast to text).
        `fields` echoes per-field metadata sourced from the dictionary — use
        it to interpret units and types.
      properties:
        generated_at: { type: string, format: date-time }
        dataset: { type: string }
        source: { type: string }
        data_type: { type: string }
        rows:
          type: array
          items:
            type: object
            additionalProperties: { type: string }
        fields:
          type: array
          items: { $ref: '#/components/schemas/FieldMeta' }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }

    FieldMeta:
      type: object
      properties:
        name: { type: string }
        raw_field: { type: string }
        canonical_field: { type: string }
        label_zh: { type: string }
        value_type: { type: string }
        unit: { type: string }
        scale: { type: integer }
        storage_location: { type: string }
        is_metadata: { type: boolean }
        is_core: { type: boolean }

    NestedQueryResponse:
      type: object
      description: |
        Nested query envelope. Each row has `top_level` (stable query columns)
        and `data_json` (full SDK detail object, unfiltered unless `fields=`
        is given, in which case data_json is filtered to the requested
        data_json-resident fields).
      properties:
        generated_at: { type: string, format: date-time }
        dataset: { type: string }
        source: { type: string }
        data_type: { type: string }
        rows:
          type: array
          items: { $ref: '#/components/schemas/NestedRow' }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }

    NestedRow:
      type: object
      properties:
        top_level:
          type: object
          additionalProperties: true
        data_json:
          type: object
          additionalProperties: true

    FieldResolutionError:
      type: object
      description: |
        Returned 400 when `fields=` contains unknown field names. Each entry
        includes up to 5 dictionary-suggested alternatives; pick one and retry.
      properties:
        error:
          type: string
          example: unknown_field
          description: Always "unknown_field".
        dataset: { type: string }
        data_type: { type: string }
        source: { type: string }
        unknown:
          type: array
          items: { $ref: '#/components/schemas/UnknownFieldHint' }

    UnknownFieldHint:
      type: object
      properties:
        field: { type: string }
        suggestions:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              raw_field: { type: string }
              label_zh: { type: string }

    CoverageScanResponse:
      type: object
      properties:
        status: { type: string, example: ok }
        scanned: { type: integer }
        results:
          type: array
          items: { $ref: '#/components/schemas/CoverageScanResult' }

    CoverageScanResult:
      type: object
      properties:
        dataset: { type: string }
        source: { type: string }
        storage_table: { type: string }
        rows_scanned: { type: integer }
        distinct_keys: { type: integer }
        governed_count: { type: integer }
        ungoverned_count: { type: integer }
        ungoverned_keys:
          type: array
          items: { type: string }

    CoverageListResponse:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        dataset: { type: string }
        status_filter: { type: string }
        count: { type: integer }
        observations:
          type: array
          items: { $ref: '#/components/schemas/CoverageObservation' }

    CoverageObservation:
      type: object
      properties:
        dataset: { type: string }
        source: { type: string }
        storage_table: { type: string }
        observed_key: { type: string }
        status: { type: string, enum: [governed, ungoverned] }
        sample_count: { type: integer }
        first_seen_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
