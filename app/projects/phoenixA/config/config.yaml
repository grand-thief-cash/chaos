# config.yaml
app_info:
  app_name: "phoenixA"
  env: "development"  # development, production

logging:
  enabled: true
  level: "DEBUG"
  format: "json"  # json 或 console
  output: "stdout"  # stdout, stderr, file
  file_config:
    dir: "./logs"       # 不配置 filename, 自动使用 app_info.app_name
  rotate_config:
    enabled: true
    max_age: 48h  # 15天 (15 * 24h)
    cleanup_enabled: true
    rotate_interval: 24h  # 24h >= 一天 -> 采用 <app_name>.log.YYYYMMDD 格式

mysql_gorm:
  enabled: true
  data_sources:
    security:
      host: 127.0.0.1
      port: 13306
      user: root
      password: 123456
      database: security
      max_open_conns: 3
      max_idle_conns: 5
      ping_on_start: true
      migrate_enabled: true
      migrate_dir: ./migrations

postgres_gorm:
  enabled: true
  log_level: info
  slow_threshold: 200ms
  data_sources:
    security:
      host: 127.0.0.1
      port: 5432
      user: chaos_app
      password: changeme
      database: chaos_db
      schema: security_dev
      max_open_conns: 10
      max_idle_conns: 5
      conn_max_life: 60m
      ping_on_start: true
      skip_default_tx: true
      migrate_enabled: true
      migrate_base: ./migrations

http_server:
  enabled: true
  address: ":18085"
  read_timeout: 100s
  write_timeout: 100s
  idle_timeout: 60s
  graceful_timeout: 10s
  enable_health: true

neo4j:
  enabled: true
  uri: "bolt://localhost:7687"
  username: neo4j
  password: "${NEO4J_PASSWORD:atlas_password}"
  database: neo4j
  max_connection_pool_size: 50
  encrypted: false

telemetry:
  enabled: true
  service_name: phoenixA
  exporter: stdout         # stdout|otlp
  sample_ratio: 0        # 0~1; adjust for sampling
  stdout_pretty: false     # false keeps exporter output compact
  stdout_file: ./logs/telemetry.log

biz_config:
  write_buffer:
    enabled: true
    max_batch_size: 2000
    flush_interval: 60s
    direct_flush_threshold: 500
    channel_size: 8192
    shutdown_timeout: 10s
